upstream lumenx_frontend {
    server 127.0.0.1:3001;
}

upstream lumenx_backend {
    server 127.0.0.1:17177;
}

server {
    listen 3027 default_server;
    listen 3028;
    server_name www.xzhtai.cn;

    client_max_body_size 200M;

    proxy_connect_timeout 60s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;

    location /projects {
        proxy_pass http://lumenx_backend;
    }

    location /series {
        proxy_pass http://lumenx_backend;
    }

    location /files/ {
        proxy_pass http://lumenx_backend;
    }

    location /tasks/ {
        proxy_pass http://lumenx_backend;
    }

    location /audio/ {
        proxy_pass http://lumenx_backend;
    }

    location /video/ {
        proxy_pass http://lumenx_backend;
    }

    location /voices {
        proxy_pass http://lumenx_backend;
    }

    location /upload {
        proxy_pass http://lumenx_backend;
        client_max_body_size 200M;
    }

    location /config/ {
        proxy_pass http://lumenx_backend;
    }

    location /auth/ {
        proxy_pass http://lumenx_backend;
    }

    location /art_direction/ {
        proxy_pass http://lumenx_backend;
    }

    location /docs {
        proxy_pass http://lumenx_backend;
    }

    location /openapi.json {
        proxy_pass http://lumenx_backend;
    }

    location /_next/webpack-hmr {
        proxy_pass http://lumenx_frontend/_next/webpack-hmr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /_next/ {
        proxy_pass http://lumenx_frontend/_next/;
    }

    location / {
        proxy_pass http://lumenx_frontend;
    }
}
