version: "3.8"

networks:
  lumenx-net:
    driver: bridge

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: lumenx-backend
    env_file:
      - .env
    environment:
      - NO_PROXY=*.aliyuncs.com,localhost,127.0.0.1
      - no_proxy=*.aliyuncs.com,localhost,127.0.0.1
    volumes:
      - ./output:/app/output
    networks:
      - lumenx-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:17177/config/info')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: lumenx-frontend
    ports:
      - "${APP_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - lumenx-net
    restart: unless-stopped
